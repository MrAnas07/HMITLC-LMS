name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push Backend to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "anas@example.com"
          git config --global user.name "Anas"
          
          git subtree split --prefix=backend -b hf-deploy
          
          git push https://muhammadanas077:$HF_TOKEN@huggingface.co/spaces/muhammadanas077/hmitlc-backend hf-deploy:main --force
